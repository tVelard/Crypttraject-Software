name: Build & release Windows installer

# Triggered manually from the Actions tab, or automatically when a tag
# matching v* is pushed. On a tag the installer is attached to the GitHub
# Release; on a manual run it is uploaded as a workflow artifact.
#
# Only Windows is built: the product ships a single one-click desktop-app
# installer (CryptTraject-Setup.exe) for Windows x64.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller>=6.3

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: python packaging/build_binaries.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptTraject-Setup
          path: dist/CryptTraject-Setup.exe
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/CryptTraject-Setup.exe
          generate_release_notes: true
