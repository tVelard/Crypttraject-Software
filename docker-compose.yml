# Local dev composition for CryptTraject.
#
#   docker compose up --build           # start server + web
#   docker compose --profile dev up     # also start a dev shell container
#
# The desktop client (CLI/GUI) is NOT containerized: it needs a Qt
# display and local filesystem access, so install it on the host with
# `pip install -e .` and point it at http://localhost:8000.

services:
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: crypttraject-server
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: crypttraject-web
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

  # Optional dev shell with the full Python toolchain and the source
  # tree bind-mounted. Useful when you want a known-good Pyfhel without
  # installing it on the host. Enable with `docker compose --profile dev up`.
  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: crypttraject-dev
    command: ["bash"]
    stdin_open: true
    tty: true
    volumes:
      - ./shared:/app/shared
      - ./client:/app/client
      - ./server:/app/server
      - ./pyproject.toml:/app/pyproject.toml
      - ./requirements.txt:/app/requirements.txt
    environment:
      - PYTHONPATH=/app/shared:/app/client:/app/server
