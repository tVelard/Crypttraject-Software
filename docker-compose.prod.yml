# Production composition for a VPS deployment.
#
#   cp .env.example .env        # then edit SITE_ADDRESS / ACME_EMAIL
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy terminates TLS (automatic Let's Encrypt when SITE_ADDRESS is a
# real domain) and is the ONLY service that publishes ports. The server
# and web containers are only reachable on the internal compose network:
#   https://<domain>/        -> landing page
#   https://<domain>/api/... -> FastAPI server
#
# The desktop client points at  https://<domain>/api
#
# The desktop client (CLI/GUI) is NOT containerized — install it on the
# operator's machine with `pip install -e .`.

services:
  server:
    build:
      context: .
      dockerfile: docker/server.prod.Dockerfile
    container_name: crypttraject-server
    expose:
      - "8000"
    environment:
      # Comma-separated allowed browser origins, or "*". Leave empty to
      # disable CORS (the desktop client does not need it).
      - CRYPTTRAJECT_CORS_ORIGINS=${CRYPTTRAJECT_CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: crypttraject-web
    expose:
      - "80"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: crypttraject-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
      # Caddy reads CADDY_ACME_EMAIL natively for Let's Encrypt registration
      # when SITE_ADDRESS is a real domain. Ignored in :80 / HTTP-only mode.
      - CADDY_ACME_EMAIL=${ACME_EMAIL:-}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persisted certificates
      - caddy_config:/config
    depends_on:
      - web
      - server
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
