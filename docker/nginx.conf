server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache hashed Vite assets, never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Downloadable binaries (the Windows CLI installer). Served from a
    # bind-mounted folder so a new build can be dropped in without
    # rebuilding the web image. Force a download rather than navigation.
    location /download/ {
        alias /usr/share/nginx/downloads/;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "no-cache";
        # Return a clean 404 if the file isn't there yet.
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
